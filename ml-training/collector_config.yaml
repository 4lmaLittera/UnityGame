# ML-Agents training config for the Collector behavior.
# Run with:
#   source ml-training/venv/bin/activate
#   mlagents-learn ml-training/collector_config.yaml --run-id=Collector_v1
# Then press Play in the Unity Editor (MLTrainingScene).
#
# The 'Collector' key MUST match the Behavior Name field in BehaviorParameters
# on the agent GameObject in Unity.

behaviors:
  Collector:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 128
      num_layers: 2
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 500000
    time_horizon: 64
    summary_freq: 10000
    threaded: true
